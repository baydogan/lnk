services:
  mongodb:
    image: mongo:7
    container_name: lnk-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: lnk
      MONGO_INITDB_ROOT_PASSWORD: lnk
      MONGO_INITDB_DATABASE: lnk
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lnk-redis
    ports:
      - "6379:6379"

  lnkd:
    build: .
    container_name: lnk-server
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PORT: "8080"
      LNK_SERVER_CONFIG: /etc/lnk/server.yaml
      MONGO_URI: "mongodb://lnk:lnk@mongodb:27017/lnk?authSource=admin"
      REDIS_ADDR: "redis:6379"
    volumes:
      - ${HOME}/.lnk:/etc/lnk:ro
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  mongodata: