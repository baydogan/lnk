services:
  mongodb:
    image: mongo:7
    container_name: lnk-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: lnk
      MONGO_INITDB_ROOT_PASSWORD: lnk
      MONGO_INITDB_DATABASE: lnk
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  redis:
    image: redis:7-alpine
    container_name: lnk-redis
    ports:
      - "6379:6379"

volumes:
  mongodata: